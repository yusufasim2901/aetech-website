<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ====================================================================
         PRIMARY SEO META TAGS
         React Helmet Async dynamically manages <title> and <meta> tags.
         These are static fallbacks for crawlers that don't execute JS.
    ==================================================================== -->
    <title>Aetech Software LLC — Digital Venture Hub | Commerce & AI Solutions</title>
    <meta name="description" content="Aetech Software LLC is a US-based digital venture hub bridging global e-commerce operations and next-generation AI & software solutions. Led by an AI expert and developer." />
    <link rel="canonical" href="https://aetechsoftware.com/" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Aetech Software LLC — Digital Venture Hub" />
    <meta property="og:description" content="Bridging global commerce and cutting-edge AI technology. Explore our ventures." />
    <meta property="og:url" content="https://aetechsoftware.com/" />
    <meta property="og:site_name" content="Aetech Software LLC" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aetech Software LLC — Digital Venture Hub" />
    <meta name="twitter:description" content="Bridging global commerce and cutting-edge AI technology." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts — Inter for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- ====================================================================
         JSON-LD STRUCTURED DATA — Organization & WebSite Schema
         Provides rich search results and Knowledge Graph eligibility.
    ==================================================================== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Aetech Software LLC",
        "url": "https://aetechsoftware.com",
        "description": "A US-based digital venture hub bridging global e-commerce and AI-driven software solutions.",
        "foundingDate": "2025",
        "founder": {
          "@type": "Person",
          "name": "Founder Name",
          "jobTitle": "AI Expert & Developer"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "contact@aetechsoftware.com",
          "contactType": "General Inquiry"
        },
        "sameAs": [
          "https://github.com/aetechsoftware"
        ]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Aetech Software LLC",
        "url": "https://aetechsoftware.com",
        "description": "Official website of Aetech Software LLC — a digital venture hub for commerce and AI solutions.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://aetechsoftware.com/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
